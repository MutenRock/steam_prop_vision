# rules.yaml — S.T.E.A.M Vision : règles de détection
# Chaque label YOLO peut avoir ses propres actions et paramètres.
#
# enabled      : true/false — activer/désactiver le label
# cooldown     : secondes entre deux déclenchements du même label
# min_duration : secondes de détection continue avant déclenchement (0 = immédiat)
# actions      : liste d'actions à exécuter lors du déclenchement
#   - type: audio        → joue un fichier aléatoire dans assets/audio/<subdir>
#   - type: video        → joue une vidéo fullscreen depuis assets/video/<subdir>
#   - type: udp          → envoie un message UDP à Loxone
#   - type: http         → fait une requête HTTP GET

rules:
  person:
    enabled: true
    cooldown: 5
    min_duration: 2.0
    actions:
      - type: audio
        subdir: ""
      - type: video
        subdir: ""
      - type: udp
        message: "STEAM_DETECT_PERSON"

  # ── Cartes PLATEST ────────────────────────────────────────────────
  plate_bougie:
    enabled: true
    cooldown: 8
    min_duration: 0
    actions:
      - type: udp
        message: "STEAM_CARD_BOUGIE"
      - type: audio
        subdir: ""
      - type: video
        subdir: ""

  plate_cellule:
    enabled: true
    cooldown: 8
    min_duration: 0
    actions:
      - type: udp
        message: "STEAM_CARD_CELLULE"
      - type: audio
        subdir: ""
      - type: video
        subdir: ""

  plate_chaudron:
    enabled: true
    cooldown: 8
    min_duration: 0
    actions:
      - type: udp
        message: "STEAM_CARD_CHAUDRON"
      - type: audio
        subdir: ""
      - type: video
        subdir: ""

  plate_dague:
    enabled: true
    cooldown: 8
    min_duration: 0
    actions:
      - type: udp
        message: "STEAM_CARD_DAGUE"
      - type: audio
        subdir: ""
      - type: video
        subdir: ""

  plate_vampire:
    enabled: true
    cooldown: 8
    min_duration: 0
    actions:
      - type: udp
        message: "STEAM_CARD_VAMPIRE"
      - type: audio
        subdir: ""
      - type: video
        subdir: ""

  chair:
    enabled: false
    cooldown: 10
    min_duration: 0
    actions:
      - type: udp
        message: "STEAM_DETECT_CHAIR"

  backpack:
    enabled: false
    cooldown: 10
    min_duration: 0
    actions:
      - type: udp
        message: "STEAM_DETECT_BACKPACK"

# Comportement global par défaut pour les labels non listés
default:
  enabled: false
  cooldown: 10
  min_duration: 0
  actions: []
